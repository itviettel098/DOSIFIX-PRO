  <link rel="manifest" href='data:application/manifest+json,{"short_name":"Dosifix","name":"Dosifix Pro","icons":[{"src":"https://i.ibb.co/Srt6mYv/311248617-475728517908853-4054123618464368558-n.jpg","sizes":"192x192","type":"image/jpeg"}],"start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#00c853"}'>

  <style>
    /* CSS làm cho App mượt hơn, không bị vỡ khung trên GitHub */
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f5f5f5; }
    iframe { border: none; width: 100%; height: 100%; }
    
    /* Hiệu ứng loading lúc chờ App của Google hiện lên */
    .loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: sans-serif; text-align: center; color: #2e7d32;
    }
    .spinner {
      border: 4px solid #f3f3f3; border-top: 4px solid #00c853;
      border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="loading" id="loader">
    <div class="spinner"></div>
    <p>Đang kết nối hệ thống B.Braun...</p>
  </div>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbz_XXXXXXXX_THAY_LINK_CUA_ONG_VAO_DAY/exec" 
    onload="document.getElementById('loader').style.display='none';">
  </iframe>

</body>
</html>
