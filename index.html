<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>DOSIFIX PRO</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dosifix">

  <link rel="icon" type="image/png" href="https://i.ibb.co/Srt6mYv/311248617-475728517908853-4054123618464368558-n.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/Srt6mYv/311248617-475728517908853-4054123618464368558-n.jpg">

  <link rel="manifest" href='data:application/manifest+json,{"short_name":"Dosifix","name":"Dosifix Pro","icons":[{"src":"https://i.ibb.co/Srt6mYv/311248617-475728517908853-4054123618464368558-n.jpg","sizes":"192x192","type":"image/jpeg"}],"start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#00c853"}'>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #ffffff; }
    iframe { border: none; width: 100%; height: 100%; seamless: seamless; }
    
    /* Màn hình chờ chuyên nghiệp có Logo */
    .splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
    }
    .logo-img { width: 100px; height: 100px; margin-bottom: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .spinner {
      border: 3px solid #f3f3f3; border-top: 3px solid #00c853;
      border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-text { margin-top: 15px; color: #1b5e20; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="splash" id="loader">
    <img src="https://i.ibb.co/Srt6mYv/311248617-475728517908853-4054123618464368558-n.jpg" class="logo-img">
    <div class="spinner"></div>
    <div class="status-text">B.Braun Dosifix</div>
  </div>

  <iframe 
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwFwvosyTdCcLp3X3flxKA32aaYl5VdUAKrBxL448CPNxfhNXXiaYLwAd2XTtikurTv0g/exec" 
    onload="document.getElementById('loader').style.display='none';">
  </iframe>

</body>
</html>
