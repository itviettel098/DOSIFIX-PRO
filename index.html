<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>PHẦN MỀM TÍNH SHOP DOSIFIX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  
  <link rel="icon" type="image/png" href="https://i.imgur.com/Srt6mYv.png">
  <link rel="apple-touch-icon" href="https://i.imgur.com/Srt6mYv.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #ffffff; font-family: sans-serif; }
    iframe { border: none; width: 100%; height: 100%; }
    
    /* Màn hình chờ cho chuyên nghiệp */
    .splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
    }
    .spinner {
      border: 4px solid #f3f3f3; border-top: 4px solid #00c853;
      border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status { margin-top: 15px; color: #2e7d32; font-weight: bold; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="splash" id="loader">
    <div class="spinner"></div>
    <div class="status">B.BRAUN DOSIFIX PRO</div>
  </div>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbwFwvosyTdCcLp3X3flxKA32aaYl5VdUAKrBxL448CPNxfhNXXiaYLwAd2XTtikurTv0g/exec" 
    onload="document.getElementById('loader').style.display='none';">
  </iframe>

</body>
</html>
